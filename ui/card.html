<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
@font-face {
  font-family: 'JioType';
  font-weight: 400;
  src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Regular.woff2') format('woff2');
}
@font-face {
  font-family: 'JioType';
  font-weight: 500;
  src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2');
}
@font-face {
  font-family: 'JioType';
  font-weight: 700;
  src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2');
}
@font-face {
  font-family: 'JioType';
  font-weight: 900;
  src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2');
}

:root {
  --primary-50: #3535f3;
  --primary-20: #e8e8fc;
  --primary-30: #9999ff;
  --secondary-50: #f7ab20;
  --sparkle-50: #1eccb0;
  --sparkle-20: #e8faf7;
  --success: #25ab21;
  --success-bg: #e8f5e8;
  --error: #fa2f40;
  --error-bg: #fef0f1;
  --warning: #f06d0f;
  --grey-100: #141414;
  --grey-80: rgba(0,0,0,0.66);
  --grey-60: #b5b5b5;
  --grey-40: #e0e0e0;
  --grey-20: #f5f5f5;
  --white: #ffffff;
  --surface-ghost: #eeeeef;
  --surface-minimal: #f5f5f5;
  --text-high: #141414;
  --text-low: rgba(25,27,30,0.65);
  --text-disabled: rgba(25,27,30,0.38);
  --stroke-subtle: rgba(36,38,43,0.12);
  --bg: #ffffff;
  --card-bg: #ffffff;
}

.dark {
  --bg: #141414;
  --card-bg: #1e1e1e;
  --text-high: #ffffff;
  --text-low: rgba(255,255,255,0.65);
  --text-disabled: rgba(255,255,255,0.38);
  --grey-20: #2a2a2a;
  --grey-40: #3a3a3a;
  --surface-ghost: #2a2a2a;
  --surface-minimal: #1e1e1e;
  --stroke-subtle: rgba(255,255,255,0.12);
  --white: #1e1e1e;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'JioType', 'Outfit', sans-serif;
  color: var(--text-high);
  background: var(--bg);
  padding: 16px;
  -webkit-font-smoothing: antialiased;
}

/* Typography tokens */
.headline-s { font-size: 24px; font-weight: 900; letter-spacing: -0.03em; }
.headline-xs { font-size: 22px; font-weight: 900; }
.headline-2xs { font-size: 20px; font-weight: 700; }
.headline-3xs { font-size: 18px; font-weight: 700; }
.title-s { font-size: 16px; font-weight: 700; }
.title-xs { font-size: 15px; font-weight: 700; }
.title-2xs { font-size: 14px; font-weight: 700; }
.body-l { font-size: 16px; font-weight: 500; line-height: 1.5; }
.body-s { font-size: 14px; font-weight: 500; line-height: 1.5; }
.body-xs { font-size: 13px; font-weight: 500; line-height: 1.4; }
.body-2xs { font-size: 12px; font-weight: 500; }
.label-s { font-size: 12px; font-weight: 700; }
.label-xs { font-size: 11px; font-weight: 700; }
.overline { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }

/* Section spacing */
.section { margin-bottom: 20px; }
.section-title { margin-bottom: 12px; color: var(--text-high); }

/* Verdict Banner */
.verdict-banner {
  border-radius: 16px;
  padding: 20px;
  color: #ffffff;
  margin-bottom: 20px;
}
.verdict-banner.buy { background: var(--success); }
.verdict-banner.rent { background: var(--primary-50); }
.verdict-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 999px;
  background: rgba(255,255,255,0.25);
  color: #ffffff;
  margin-bottom: 8px;
}
.verdict-text { color: rgba(255,255,255,0.9); margin-top: 8px; }

/* Metric cards */
.metrics-row {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}
.metric-card {
  flex: 1;
  background: var(--grey-20);
  border-radius: 12px;
  padding: 12px;
  text-align: center;
}
.metric-value { color: var(--text-high); margin-top: 4px; }
.metric-label { color: var(--text-low); }

/* Chart container */
.chart-container {
  background: var(--card-bg);
  border: 1px solid var(--stroke-subtle);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 20px;
}
.chart-container canvas { width: 100% !important; }

/* Table */
.table-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  margin-bottom: 20px;
}
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 500px;
}
th {
  background: var(--grey-20);
  color: var(--text-low);
  padding: 8px 10px;
  text-align: right;
  border-bottom: 1px solid var(--stroke-subtle);
  white-space: nowrap;
}
th:first-child { text-align: left; }
td {
  padding: 8px 10px;
  text-align: right;
  border-bottom: 1px solid var(--stroke-subtle);
  white-space: nowrap;
}
td:first-child { text-align: left; }
tr.highlight { background: var(--success-bg); }
.dark tr.highlight { background: rgba(37,171,33,0.15); }

/* Snapshot card */
.snapshot-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 20px;
}
.snapshot-item {
  background: var(--grey-20);
  border-radius: 10px;
  padding: 10px 12px;
}
.snapshot-item .label { color: var(--text-low); margin-bottom: 2px; }
.snapshot-item .value { color: var(--text-high); }

/* Sliders */
.slider-section {
  background: var(--surface-minimal);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 20px;
}
.slider-row {
  margin-bottom: 14px;
}
.slider-row:last-child { margin-bottom: 0; }
.slider-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.slider-label { color: var(--text-low); }
.slider-value { color: var(--primary-50); }
input[type="range"] {
  -webkit-appearance: none;
  width: 100%;
  height: 4px;
  border-radius: 2px;
  background: var(--grey-40);
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--primary-50);
  cursor: pointer;
  border: 2px solid var(--white);
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}

/* Hidden costs */
.costs-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}
.costs-col {
  background: var(--grey-20);
  border-radius: 12px;
  padding: 12px;
}
.costs-col-title {
  color: var(--text-high);
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--stroke-subtle);
}
.cost-row {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  gap: 4px;
}
.cost-label { color: var(--text-low); flex-shrink: 0; }
.cost-value { color: var(--text-high); text-align: right; }

/* Followup buttons */
.followup-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 8px;
}
.followup-btn {
  background: var(--primary-20);
  color: var(--primary-50);
  border: none;
  border-radius: 999px;
  padding: 10px 14px;
  font-family: 'JioType', 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  text-align: center;
  line-height: 1.3;
}
.followup-btn:active { opacity: 0.7; }

/* Assumptions */
.assumptions {
  background: var(--surface-ghost);
  border-radius: 10px;
  padding: 12px;
  margin-top: 4px;
}
.assumptions-row {
  display: flex;
  justify-content: space-between;
  padding: 2px 0;
}

/* Warning */
.warning-bar {
  background: #fff3e0;
  border-left: 3px solid var(--warning);
  border-radius: 0 8px 8px 0;
  padding: 10px 12px;
  margin-bottom: 16px;
  color: var(--grey-100);
}
.dark .warning-bar { background: rgba(240,109,15,0.15); }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
const DATA = /*__DATA_PLACEHOLDER__*/{};

// ===== JBIQ LIFECYCLE =====
function postMsg(msg) {
  try {
    if (window.ReactNativeWebView && window.ReactNativeWebView.postMessage) {
      window.ReactNativeWebView.postMessage(JSON.stringify(msg));
    } else if (window.parent && window.parent !== window) {
      window.parent.postMessage(JSON.stringify(msg), '*');
    }
  } catch(e) {}
}

function reportHeight() {
  requestAnimationFrame(() => {
    postMsg({ type: 'ui-size-change', height: document.body.scrollHeight + 32, scrollable: false });
  });
}

window.addEventListener('message', (e) => {
  try {
    const msg = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
    if (msg.type === 'ui-lifecycle-iframe-render-data') {
      if (msg.theme === 'dark') document.body.classList.add('dark');
      else document.body.classList.remove('dark');
    }
  } catch(ex) {}
});

// ===== HELPERS =====
function fmtL(n) {
  if (n == null) return '—';
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  if (abs >= 10000000) return sign + (abs/10000000).toFixed(1) + 'Cr';
  if (abs >= 100000) return sign + (abs/100000).toFixed(1) + 'L';
  if (abs >= 1000) return sign + (abs/1000).toFixed(0) + 'K';
  return sign + abs.toFixed(0);
}

function fmtComma(n) {
  if (n == null) return '—';
  const neg = n < 0;
  const s = String(Math.round(Math.abs(n)));
  if (s.length <= 3) return (neg?'-':'') + s;
  const last3 = s.slice(-3);
  let rest = s.slice(0,-3);
  const parts = [];
  while (rest.length > 0) {
    parts.unshift(rest.slice(-2));
    rest = rest.slice(0, -2);
  }
  return (neg?'-':'') + parts.join(',') + ',' + last3;
}

function sendPrompt(text) {
  postMsg({ type: 'prompt', payload: { text: text } });
}

// ===== RENDER =====
function render() {
  const d = DATA;
  const inp = d.inputs_used || {};
  const app = document.getElementById('app');
  let html = '';

  // Warning
  if (d.low_dp_warning) {
    html += `<div class="warning-bar body-s">${d.low_dp_warning}</div>`;
  }

  // 1. Verdict Banner
  const vc = d.verdict === 'BUY' ? 'buy' : 'rent';
  html += `
  <div class="verdict-banner ${vc}">
    <div class="verdict-badge label-s">${d.verdict === 'BUY' ? 'BUYING IS BETTER' : 'RENTING IS BETTER'}</div>
    <div class="headline-s">${d.verdict === 'BUY' ? 'Ghar Khareed Lo!' : 'Kiraya Dete Raho'}</div>
    <div class="verdict-text body-s">${d.verdict_text}</div>
  </div>`;

  // 2. Metric cards
  const hs = d.horizon_summary || {};
  html += `
  <div class="metrics-row">
    <div class="metric-card">
      <div class="metric-label label-xs">Break-even</div>
      <div class="metric-value headline-3xs">${d.breakeven_year ? 'Year ' + d.breakeven_year : 'N/A'}</div>
    </div>
    <div class="metric-card">
      <div class="metric-label label-xs">EMI vs Rent</div>
      <div class="metric-value headline-3xs">₹${fmtComma(d.monthly_delta)}/mo</div>
    </div>
    <div class="metric-card">
      <div class="metric-label label-xs">${inp.planning_horizon_years}Y Savings</div>
      <div class="metric-value headline-3xs" style="color:${hs.net_delta>=0?'var(--success)':'var(--error)'}">₹${fmtL(hs.net_delta)}</div>
    </div>
  </div>`;

  // 3. Crossover Chart
  html += `
  <div class="section">
    <div class="section-title title-s">Cost Comparison Over Time</div>
    <div class="chart-container"><canvas id="crossoverChart" height="220"></canvas></div>
  </div>`;

  // 4. Year-by-year table
  const showYears = [1,2,3,5,7,10,15,20].filter(y => y <= inp.planning_horizon_years);
  html += `
  <div class="section">
    <div class="section-title title-s">Year-by-Year Breakdown</div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th class="label-xs">Year</th>
        <th class="label-xs">Rent/mo</th>
        <th class="label-xs">Cum. Rent</th>
        <th class="label-xs">Cum. Buy</th>
        <th class="label-xs">Better</th>
      </tr></thead><tbody>`;
  const series = d.yearly_series || [];
  showYears.forEach(y => {
    const row = series[y-1];
    if (!row) return;
    const isBE = d.breakeven_year === y;
    html += `<tr class="${isBE ? 'highlight' : ''}">
      <td class="body-xs">${y}${isBE?' ★':''}</td>
      <td class="body-xs">₹${fmtComma(row.monthly_rent_that_year)}</td>
      <td class="body-xs">₹${fmtL(row.cumulative_rent_cost)}</td>
      <td class="body-xs">₹${fmtL(row.cumulative_buy_cost)}</td>
      <td class="body-xs" style="color:${row.better==='BUY'?'var(--success)':'var(--primary-50)'}">${row.better}</td>
    </tr>`;
  });
  html += `</tbody></table></div></div>`;

  // 5. Monthly Snapshot
  const ms = d.monthly_snapshot || {};
  html += `
  <div class="section">
    <div class="section-title title-s">Monthly Snapshot</div>
    <div class="snapshot-grid">
      <div class="snapshot-item"><div class="label body-2xs">Current Rent</div><div class="value title-2xs">₹${fmtComma(ms.current_rent)}</div></div>
      <div class="snapshot-item"><div class="label body-2xs">Monthly EMI</div><div class="value title-2xs">₹${fmtComma(ms.emi)}</div></div>
      <div class="snapshot-item"><div class="label body-2xs">Stamp Duty + Reg</div><div class="value title-2xs">₹${fmtL(ms.stamp_duty + ms.registration)}</div></div>
      <div class="snapshot-item"><div class="label body-2xs">Maintenance/mo</div><div class="value title-2xs">₹${fmtComma(ms.maintenance)}</div></div>
      ${ms.rent_year_5 != null ? `<div class="snapshot-item"><div class="label body-2xs">Rent in Year 5</div><div class="value title-2xs">₹${fmtComma(ms.rent_year_5)}</div></div>` : ''}
      ${ms.rent_year_10 != null ? `<div class="snapshot-item"><div class="label body-2xs">Rent in Year 10</div><div class="value title-2xs">₹${fmtComma(ms.rent_year_10)}</div></div>` : ''}
    </div>
  </div>`;

  // 6. Sliders (Fine-Tuner)
  const sliders = [
    { id: 'interest_rate_pct', label: 'Interest Rate', min: 6, max: 12, step: 0.25, val: inp.interest_rate_pct, unit: '%' },
    { id: 'loan_tenure_years', label: 'Loan Tenure', min: 5, max: 30, step: 1, val: inp.loan_tenure_years, unit: ' yrs' },
    { id: 'planning_horizon_years', label: 'Planning Horizon', min: 5, max: 25, step: 1, val: inp.planning_horizon_years, unit: ' yrs' },
    { id: 'rent_escalation_pct', label: 'Rent Escalation', min: 3, max: 15, step: 0.5, val: inp.rent_escalation_pct, unit: '%/yr' },
    { id: 'appreciation_rate_pct', label: 'Property Appreciation', min: 1, max: 18, step: 0.5, val: inp.appreciation_rate_pct, unit: '%/yr' },
    { id: 'down_payment_inv_return_pct', label: 'Invest Return (if renting)', min: 4, max: 15, step: 0.5, val: inp.down_payment_inv_return_pct, unit: '%' },
  ];

  html += `
  <div class="section">
    <div class="section-title title-s">Fine-Tune Assumptions</div>
    <div class="slider-section">`;
  sliders.forEach(s => {
    html += `
      <div class="slider-row">
        <div class="slider-header">
          <span class="slider-label body-2xs">${s.label}</span>
          <span class="slider-value label-s" id="val_${s.id}">${s.val}${s.unit}</span>
        </div>
        <input type="range" id="sl_${s.id}" min="${s.min}" max="${s.max}" step="${s.step}" value="${s.val}" />
      </div>`;
  });
  html += `
      <button class="followup-btn" style="width:100%;margin-top:10px;" id="recalcBtn">Recalculate</button>
    </div>
  </div>`;

  // 7. City Appreciation Chart
  if (d.city_appreciation) {
    html += `
    <div class="section">
      <div class="section-title title-s">${d.city_appreciation.city} Property Appreciation</div>
      <div class="chart-container"><canvas id="apprChart" height="180"></canvas></div>
      <div class="body-2xs" style="color:var(--text-low);margin-top:4px;">Source: ${d.city_appreciation.source}</div>
    </div>`;
  }

  // 8. Hidden Costs
  const hc = d.hidden_costs || {};
  html += `
  <div class="section">
    <div class="section-title title-s">Hidden Costs</div>
    <div class="costs-grid">
      <div class="costs-col">
        <div class="costs-col-title label-s" style="color:var(--success)">Buying</div>`;
  (hc.buying || []).forEach(c => {
    html += `<div class="cost-row"><span class="cost-label body-2xs">${c.label}</span><span class="cost-value body-2xs">${c.value}</span></div>`;
  });
  html += `</div><div class="costs-col">
        <div class="costs-col-title label-s" style="color:var(--primary-50)">Renting</div>`;
  (hc.renting || []).forEach(c => {
    html += `<div class="cost-row"><span class="cost-label body-2xs">${c.label}</span><span class="cost-value body-2xs">${c.value}</span></div>`;
  });
  html += `</div></div></div>`;

  // 9. Follow-up Buttons
  const city = inp.city || 'your city';
  html += `
  <div class="section">
    <div class="followup-grid">
      <button class="followup-btn" onclick="sendPrompt('What if I delay buying by 2 years?')">What if I delay 2 years?</button>
      <button class="followup-btn" onclick="sendPrompt('What if interest rates drop to 7.5%?')">Interest at 7.5%?</button>
      <button class="followup-btn" onclick="sendPrompt('Show me average rent for ${city}')">Avg rent in ${city}</button>
      <button class="followup-btn" onclick="sendPrompt('Show city appreciation data for ${city}')">Appreciation data</button>
    </div>
  </div>`;

  // 10. Assumptions
  const asmpt = d.assumptions || {};
  html += `
  <div class="assumptions">
    <div class="overline" style="color:var(--text-low);margin-bottom:6px;">Assumptions Used</div>`;
  Object.entries(asmpt).forEach(([k, v]) => {
    html += `<div class="assumptions-row"><span class="body-2xs" style="color:var(--text-low)">${k.replace(/_/g,' ')}</span><span class="body-2xs">${v}</span></div>`;
  });
  html += `</div>`;

  app.innerHTML = html;

  // Render charts after DOM update
  requestAnimationFrame(() => {
    renderCrossoverChart();
    renderAppreciationChart();
    bindSliders();
    reportHeight();
  });
}

// ===== CHARTS =====
let crossoverChartInstance = null;
let apprChartInstance = null;

function renderCrossoverChart() {
  const canvas = document.getElementById('crossoverChart');
  if (!canvas || !window.Chart) return;
  const series = DATA.yearly_series || [];
  const labels = series.map(r => 'Yr ' + r.year);
  const rentData = series.map(r => r.cumulative_rent_cost / 100000);
  const buyData = series.map(r => r.cumulative_buy_cost / 100000);
  const investData = series.map(r => r.net_rent_invest_cost / 100000);

  const isDark = document.body.classList.contains('dark');
  const gridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
  const textColor = isDark ? 'rgba(255,255,255,0.6)' : 'rgba(0,0,0,0.5)';

  if (crossoverChartInstance) crossoverChartInstance.destroy();
  crossoverChartInstance = new Chart(canvas, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'Cumulative Rent',
          data: rentData,
          borderColor: '#fa2f40',
          backgroundColor: 'rgba(250,47,64,0.08)',
          fill: false,
          tension: 0.3,
          pointRadius: 0,
          borderWidth: 2.5,
        },
        {
          label: 'Net Buy Cost',
          data: buyData,
          borderColor: '#25ab21',
          backgroundColor: 'rgba(37,171,33,0.08)',
          fill: false,
          tension: 0.3,
          pointRadius: 0,
          borderWidth: 2.5,
        },
        {
          label: 'Rent + Invest DP',
          data: investData,
          borderColor: '#1eccb0',
          backgroundColor: 'rgba(30,204,176,0.08)',
          fill: false,
          tension: 0.3,
          pointRadius: 0,
          borderWidth: 2,
          borderDash: [6, 3],
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: {
          position: 'bottom',
          labels: { font: { family: "'JioType','Outfit',sans-serif", size: 11 }, color: textColor, usePointStyle: true, pointStyle: 'line', padding: 12 }
        },
        tooltip: {
          backgroundColor: isDark ? '#2a2a2a' : '#ffffff',
          titleColor: isDark ? '#ffffff' : '#141414',
          bodyColor: isDark ? '#ffffff' : '#141414',
          borderColor: isDark ? '#3a3a3a' : '#e0e0e0',
          borderWidth: 1,
          titleFont: { family: "'JioType','Outfit',sans-serif", weight: 700, size: 12 },
          bodyFont: { family: "'JioType','Outfit',sans-serif", size: 11 },
          callbacks: { label: function(ctx) { return ctx.dataset.label + ': ₹' + ctx.parsed.y.toFixed(1) + 'L'; } }
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { family: "'JioType','Outfit',sans-serif", size: 10 }, color: textColor, maxTicksLimit: 10 } },
        y: { grid: { color: gridColor }, ticks: { font: { family: "'JioType','Outfit',sans-serif", size: 10 }, color: textColor, callback: v => '₹' + v + 'L' } }
      }
    }
  });

  // Draw break-even annotation
  if (DATA.breakeven_year) {
    const beIdx = DATA.breakeven_year - 1;
    const plugin = {
      id: 'breakEvenLine',
      afterDraw(chart) {
        const xScale = chart.scales.x;
        const yScale = chart.scales.y;
        const x = xScale.getPixelForValue(beIdx);
        const ctx = chart.ctx;
        ctx.save();
        ctx.setLineDash([4, 4]);
        ctx.strokeStyle = '#f7ab20';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(x, yScale.top);
        ctx.lineTo(x, yScale.bottom);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = '#f7ab20';
        ctx.font = "700 11px 'JioType','Outfit',sans-serif";
        ctx.textAlign = 'center';
        ctx.fillText('Break-even Yr ' + DATA.breakeven_year, x, yScale.top - 6);
        ctx.restore();
      }
    };
    crossoverChartInstance.options.plugins.breakEvenLine = true;
    Chart.register(plugin);
    crossoverChartInstance.update();
  }
}

function renderAppreciationChart() {
  const canvas = document.getElementById('apprChart');
  if (!canvas || !window.Chart || !DATA.city_appreciation) return;
  const yearly = DATA.city_appreciation.yearly_data || {};
  const labels = Object.keys(yearly);
  const values = Object.values(yearly);
  const natAvg = DATA.city_appreciation.national_avg_pct;

  const isDark = document.body.classList.contains('dark');
  const gridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
  const textColor = isDark ? 'rgba(255,255,255,0.6)' : 'rgba(0,0,0,0.5)';

  if (apprChartInstance) apprChartInstance.destroy();
  apprChartInstance = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        {
          label: DATA.city_appreciation.city,
          data: values,
          backgroundColor: '#3535f3',
          borderRadius: 6,
          barPercentage: 0.6,
        },
        {
          label: 'National Avg',
          data: labels.map(() => natAvg),
          type: 'line',
          borderColor: '#f7ab20',
          borderWidth: 2,
          borderDash: [5, 3],
          pointRadius: 0,
          fill: false,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'bottom',
          labels: { font: { family: "'JioType','Outfit',sans-serif", size: 11 }, color: textColor, usePointStyle: true, padding: 12 }
        },
        tooltip: {
          backgroundColor: isDark ? '#2a2a2a' : '#ffffff',
          titleColor: isDark ? '#ffffff' : '#141414',
          bodyColor: isDark ? '#ffffff' : '#141414',
          borderColor: isDark ? '#3a3a3a' : '#e0e0e0',
          borderWidth: 1,
          bodyFont: { family: "'JioType','Outfit',sans-serif", size: 11 },
          callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y + '%' }
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { family: "'JioType','Outfit',sans-serif", size: 11 }, color: textColor } },
        y: { grid: { color: gridColor }, ticks: { font: { family: "'JioType','Outfit',sans-serif", size: 10 }, color: textColor, callback: v => v + '%' } }
      }
    }
  });
}

// ===== SLIDERS =====
function bindSliders() {
  const sliderIds = ['interest_rate_pct','loan_tenure_years','planning_horizon_years','rent_escalation_pct','appreciation_rate_pct','down_payment_inv_return_pct'];
  const units = { interest_rate_pct:'%', loan_tenure_years:' yrs', planning_horizon_years:' yrs', rent_escalation_pct:'%/yr', appreciation_rate_pct:'%/yr', down_payment_inv_return_pct:'%' };

  sliderIds.forEach(id => {
    const sl = document.getElementById('sl_' + id);
    const valEl = document.getElementById('val_' + id);
    if (!sl || !valEl) return;
    sl.addEventListener('input', () => {
      valEl.textContent = sl.value + (units[id] || '');
    });
  });

  const btn = document.getElementById('recalcBtn');
  if (btn) {
    btn.addEventListener('click', () => {
      const inp = DATA.inputs_used;
      const params = {};
      sliderIds.forEach(id => {
        const sl = document.getElementById('sl_' + id);
        if (sl) params[id] = parseFloat(sl.value);
      });
      const prompt = `Recalculate rent vs buy with: property_price=${inp.property_price}, monthly_rent=${inp.monthly_rent}, city="${inp.city}", down_payment_pct=${inp.down_payment_pct}, interest_rate_pct=${params.interest_rate_pct}, loan_tenure_years=${params.loan_tenure_years}, planning_horizon_years=${params.planning_horizon_years}, rent_escalation_pct=${params.rent_escalation_pct}, appreciation_rate_pct=${params.appreciation_rate_pct}, down_payment_inv_return_pct=${params.down_payment_inv_return_pct}`;
      sendPrompt(prompt);
      btn.textContent = 'Recalculating...';
      btn.style.opacity = '0.5';
      setTimeout(() => { btn.textContent = 'Recalculate'; btn.style.opacity = '1'; }, 3000);
    });
  }
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  postMsg({ type: 'ui-lifecycle-iframe-ready' });
  if (DATA && DATA.verdict) {
    render();
  } else {
    document.getElementById('app').innerHTML = '<div class="body-s" style="padding:20px;color:var(--text-low);">No data available. Please run the calculator first.</div>';
    reportHeight();
  }
});
</script>
