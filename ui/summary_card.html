<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
@font-face { font-family: 'JioType'; font-weight: 400; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Regular.woff2') format('woff2'); }
@font-face { font-family: 'JioType'; font-weight: 500; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2'); }
@font-face { font-family: 'JioType'; font-weight: 700; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2'); }

:root {
  --primary-50: #3535f3; --primary-20: #e8e8fc;
  --success-50: #0b8043; --success-10: #e6f4ea;
  --error-50: #fa2f40; --error-10: #fce8ea;
  --warning-50: #f9a825; --warning-10: #fff8e1;
  --grey-90: #141414; --grey-70: #555; --grey-50: #888; --grey-30: #c4c4c4; --grey-10: #f0f0f0;
  --bg: #ffffff; --surface: #f5f5f5; --text: #141414; --text-secondary: #555;
  --sparkle-50: #1eccb0; --sparkle-10: #e0faf5;
}
.dark {
  --bg: #141414; --surface: #1e1e1e; --text: #f0f0f0; --text-secondary: #aaa;
  --grey-10: #2a2a2a; --grey-30: #555; --grey-50: #888;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'JioType', -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 16px; max-width: 480px; margin: 0 auto; }

/* Verdict banner */
.verdict { border-radius: 12px; padding: 14px 16px; margin-bottom: 14px; }
.verdict-buy { background: var(--success-10); border: 1px solid var(--success-50); }
.verdict-rent { background: #e8e8fc; border: 1px solid var(--primary-50); }
.verdict-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; letter-spacing: 0.5px; margin-bottom: 6px; }
.badge-buy { background: var(--success-50); color: #fff; }
.badge-rent { background: var(--primary-50); color: #fff; }
.verdict-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.verdict-sub { font-size: 13px; color: var(--text-secondary); line-height: 1.4; }

/* Metric cards */
.metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.metric { background: var(--surface); border-radius: 10px; padding: 10px 12px; }
.metric-label { font-size: 11px; color: var(--grey-50); margin-bottom: 4px; }
.metric-value { font-size: 18px; font-weight: 700; }
.metric-sub { font-size: 10px; color: var(--grey-50); margin-top: 2px; }
.green { color: var(--success-50); }
.blue { color: var(--primary-50); }

/* Chart */
.chart-card { background: var(--surface); border-radius: 12px; padding: 12px; margin-bottom: 14px; }
.chart-title { font-size: 11px; font-weight: 500; color: var(--grey-50); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.chart-legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--grey-50); }
.legend-dot { width: 10px; height: 3px; border-radius: 2px; display: inline-block; }

/* Buttons */
.buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.btn { background: var(--surface); border: 1px solid var(--grey-30); border-radius: 10px; padding: 10px 12px; font-family: 'JioType', sans-serif; font-size: 12px; font-weight: 500; color: var(--text); cursor: pointer; text-align: left; line-height: 1.3; }
.btn:active { background: var(--grey-10); }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const DATA = /*__DATA_PLACEHOLDER__*/{};

// JBIQ lifecycle
function postMsg(msg) {
  try {
    if (window.ReactNativeWebView && window.ReactNativeWebView.postMessage) {
      window.ReactNativeWebView.postMessage(JSON.stringify(msg));
    } else if (window.parent && window.parent !== window) {
      window.parent.postMessage(JSON.stringify(msg), '*');
    }
  } catch(e) {}
}
function reportHeight() {
  requestAnimationFrame(() => {
    postMsg({ type: 'ui-size-change', height: document.body.scrollHeight + 24, scrollable: false });
  });
}
window.addEventListener('message', (e) => {
  try {
    const msg = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
    if (msg.type === 'ui-lifecycle-iframe-render-data') {
      if (msg.theme === 'dark') document.body.classList.add('dark');
      else document.body.classList.remove('dark');
    }
  } catch(ex) {}
});
function sendPrompt(text) {
  postMsg({ type: 'prompt', payload: { text } });
}

// Helpers
function fmtL(n) {
  if (n == null) return '—';
  const abs = Math.abs(n), sign = n < 0 ? '-' : '';
  if (abs >= 10000000) return sign + '₹' + (abs/10000000).toFixed(1) + 'Cr';
  if (abs >= 100000) return sign + '₹' + (abs/100000).toFixed(1) + 'L';
  if (abs >= 1000) return sign + '₹' + (abs/1000).toFixed(0) + 'K';
  return sign + '₹' + abs.toFixed(0);
}

function render() {
  const d = DATA;
  const inp = d.inputs_used || {};
  const isBuy = d.verdict === 'BUY';
  const app = document.getElementById('app');
  let html = '';

  // 1. Verdict banner
  html += `<div class="verdict ${isBuy ? 'verdict-buy' : 'verdict-rent'}">`;
  html += `<div class="verdict-badge ${isBuy ? 'badge-buy' : 'badge-rent'}">${isBuy ? 'BUYING IS BETTER' : 'RENTING IS BETTER'}</div>`;
  html += `<div class="verdict-title">${isBuy ? 'Ghar Khareed Lo!' : 'Kiraya Dete Raho'}</div>`;
  html += `<div class="verdict-sub">${d.verdict_text || ''}</div>`;
  html += `</div>`;

  // 2. Metric cards
  const horizon = inp.planning_horizon_years || 20;
  const delta = (d.horizon_summary && d.horizon_summary.net_delta) || 0;
  const deltaPositive = delta >= 0;
  html += `<div class="metrics">`;
  html += `<div class="metric"><div class="metric-label">Break-even</div><div class="metric-value ${isBuy ? 'green' : 'blue'}">${d.breakeven_year ? 'Year ' + d.breakeven_year : '—'}</div><div class="metric-sub">${isBuy ? 'buying better from here' : 'beyond horizon'}</div></div>`;
  html += `<div class="metric"><div class="metric-label">EMI vs Rent</div><div class="metric-value">${fmtL(d.monthly_delta)}/mo</div><div class="metric-sub">more to buy</div></div>`;
  html += `<div class="metric"><div class="metric-label">${horizon}yr savings</div><div class="metric-value ${deltaPositive ? 'green' : 'blue'}">${fmtL(Math.abs(delta))}</div><div class="metric-sub">${deltaPositive ? 'buying ahead' : 'renting ahead'}</div></div>`;
  html += `</div>`;

  // 3. Crossover chart
  html += `<div class="chart-card">`;
  html += `<div class="chart-title">Cumulative cost over ${horizon} years</div>`;
  html += `<div class="chart-legend">`;
  html += `<span class="legend-item"><span class="legend-dot" style="background:#fa2f40"></span>Renting</span>`;
  html += `<span class="legend-item"><span class="legend-dot" style="background:${isBuy ? '#0b8043' : '#3535f3'}"></span>Buying (net)</span>`;
  html += `<span class="legend-item"><span class="legend-dot" style="background:#1eccb0;border-top:1px dashed #1eccb0;height:0"></span>Rent + invest DP</span>`;
  html += `</div>`;
  html += `<div style="position:relative;width:100%;height:200px;"><canvas id="chart"></canvas></div>`;
  html += `</div>`;

  // 4. Buttons
  const city = inp.city || 'your city';
  html += `<div class="buttons">`;
  html += `<div class="btn" onclick="sendPrompt('Year-by-year breakdown dikhao')">📊 Year-by-year breakdown</div>`;
  html += `<div class="btn" onclick="sendPrompt('Monthly snapshot dikhao')">💰 Monthly snapshot</div>`;
  html += `<div class="btn" onclick="sendPrompt('Hidden costs comparison dikhao')">🔍 Hidden costs</div>`;
  html += `<div class="btn" onclick="sendPrompt('Numbers tune karna hai — sliders dikhao')">⚙️ Tune numbers</div>`;
  html += `</div>`;

  app.innerHTML = html;

  // Render chart
  renderChart(d);
  reportHeight();
  setTimeout(reportHeight, 500);
  setTimeout(reportHeight, 1500);
}

function renderChart(d) {
  const series = d.yearly_series || [];
  if (!series.length) return;
  const labels = series.map(s => 'Yr ' + s.year);
  const rentData = series.map(s => s.cumulative_rent_cost);
  const buyData = series.map(s => s.cumulative_buy_cost);
  const investData = series.map(s => s.net_rent_invest_cost || s.cumulative_rent_cost - s.invest_corpus_gain);

  const isBuy = d.verdict === 'BUY';
  new Chart(document.getElementById('chart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Renting', data: rentData, borderColor: '#fa2f40', backgroundColor: 'rgba(250,47,64,0.05)', borderWidth: 2, pointRadius: 0, fill: true, tension: 0.3 },
        { label: 'Buying', data: buyData, borderColor: isBuy ? '#0b8043' : '#3535f3', backgroundColor: isBuy ? 'rgba(11,128,67,0.05)' : 'rgba(53,53,243,0.05)', borderWidth: 2, pointRadius: 0, fill: true, tension: 0.3 },
        { label: 'Rent+Invest', data: investData, borderColor: '#1eccb0', backgroundColor: 'transparent', borderWidth: 1.5, pointRadius: 0, fill: false, tension: 0.3, borderDash: [4, 3] },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => fmtL(ctx.raw) } } },
      scales: {
        x: { ticks: { font: { size: 10 }, autoSkip: true, maxTicksLimit: 6, maxRotation: 0 }, grid: { display: false } },
        y: { ticks: { font: { size: 10 }, callback: v => fmtL(v) }, grid: { color: 'rgba(0,0,0,0.05)' } }
      }
    }
  });
}

// Init
document.addEventListener('DOMContentLoaded', () => {
  postMsg({ type: 'ui-lifecycle-iframe-ready' });
});
if (DATA && DATA.verdict) render();
else document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
